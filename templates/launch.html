<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTI Hello World</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; background: #f8f9fa; color: #212529; }
        h1 { color: #0d6efd; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; background: #fff; }
        th, td { border: 1px solid #dee2e6; padding: 0.5rem 0.75rem; text-align: left; }
        th { background: #e9ecef; }
        td:first-child { font-weight: 600; width: 40%; word-break: break-all; }
        td:last-child { word-break: break-all; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Hello, {{ name }}!</h1>
    <h2>LTI Launch Parameters</h2>
    <table>
        <thead><tr><th>Claim</th><th>Value</th></tr></thead>
        <tbody>
        {% for key, value in claims %}
            <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</body>
</html>
